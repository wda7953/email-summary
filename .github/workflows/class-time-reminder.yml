name: 靜與慈儀姊上課時間確認提醒

on:
  schedule:
    - cron: "0 5 26 6 *"  # 6/26 13:00 台灣時間 (UTC+8)
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: 傳送 LINE 提醒
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"to\": \"${{ secrets.LINE_USER_ID }}\", \"messages\": [{\"type\": \"text\", \"text\": \"提醒：記得確認靜和慈儀姊的上課時間 📅\"}]}"
