name: 皮拉提斯自主練習提醒

on:
  workflow_dispatch:  # 由 cron-job.org 觸發（GitHub schedule 常態延遲 10+ 小時，改外部觸發）

jobs:
  morning-remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安裝套件
        run: pip install caldav pytz requests icalendar google-api-python-client google-auth

      - name: 查空檔並發早晨提醒
        env:
          ICLOUD_PASSWORD:           ${{ secrets.ICLOUD_PASSWORD }}
          GCAL_REFRESH_TOKEN:        ${{ secrets.GCAL_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID:          ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:      ${{ secrets.GOOGLE_CLIENT_SECRET }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID:              ${{ secrets.LINE_USER_ID }}
          REMINDER_MODE:             morning
        run: python pilates_reminder.py

