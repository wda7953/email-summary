name: 每日觀照提醒

on:
  workflow_dispatch:  # 由 cron-job.org 觸發，每天早上 07:00 台灣時間

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: 傳送 LINE 提醒
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"to": "${{ secrets.LINE_USER_ID }}", "messages": [{"type": "text", "text": "🧘 先觀照自己、活得自在（盡本分）、做事圓滿、進而豁達\n觀照貪、慾望、本分責任義務"}]}'
