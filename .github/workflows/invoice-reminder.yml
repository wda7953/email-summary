name: 每月開發票提醒

on:
  schedule:
    - cron: '0 1 1 * *'  # 每月 1 日 09:00 台灣時間（UTC+8）
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: 傳送 LINE 提醒
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"to": "${{ secrets.LINE_USER_ID }}", "messages": [{"type": "text", "text": "🧾 提醒：這個月的發票該開了！"}]}'
